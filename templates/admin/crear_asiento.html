{% extends "admin/base.html" %}

{% block title %}Crear Asiento - Cinema Admin{% endblock %}
{% block page_title %}Crear Nuevo Asiento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card stats-card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-chair text-secondary me-2"></i>Información del Asiento</h5>
            </div>
            <div class="card-body">
                <form id="asientoForm" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="numero" class="form-label">Número *</label>
                            <input type="text" class="form-control" id="numero" name="numero" placeholder="A1, B5, etc." required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="fila" class="form-label">Fila *</label>
                            <input type="text" class="form-control" id="fila" name="fila" maxlength="1" placeholder="A, B, C..." required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="columna" class="form-label">Columna *</label>
                            <input type="number" class="form-control" id="columna" name="columna" min="1" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="tipo_id" class="form-label">Tipo de Asiento *</label>
                        <select class="form-select" id="tipo_id" name="tipo_id" required>
                            <option value="">Seleccionar tipo...</option>
                            {% for tipo in tipos_asientos %}
                            <option value="{{ tipo.id }}">{{ tipo.nombre.title() }} - ${{ "%.2f"|format(tipo.precio) }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-secondary">
                            <i class="fas fa-save me-2"></i>Crear Asiento
                        </button>
                        <a href="{{ url_for('admin_asientos') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('asientoForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch(window.location.href, {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Asiento creado exitosamente');
            window.location.href = '{{ url_for("admin_asientos") }}';
        } else {
            alert('Error: ' + data.error);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error al crear el asiento');
    });
});
</script>
{% endblock %}
