<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - CINEVOX</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .registro-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .registro-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .registro-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .registro-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .registro-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .registro-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            border-radius: 8px;
            border: 1px solid #f5a6a6;
            background-color: #ffe6e6;
            color: #c33;
            margin-bottom: 20px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #ccc;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider p {
            margin: 0 10px;
            color: #999;
            font-size: 13px;
        }

        .btn-login-link {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-login-link:hover {
            background: #f0f4ff;
            color: #667eea;
        }

        .terms {
            font-size: 12px;
            color: #766;
            margin-top: 15px;
            text-align: center;
            line-height: 1.6;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .registro-container {
                padding: 10px;
            }

            .registro-body {
                padding: 30px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .registro-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="registro-container">
        <div class="registro-card">
            <div class="registro-header">
                <h1><i class="fas fa-user-plus"></i> Crear Cuenta</h1>
                <p>Únete a CINEVOX y disfruta</p>
            </div>

            <div class="registro-body">
                {% if error %}
                <div class="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('registro') }}">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="nombre">
                                <i class="fas fa-user"></i> Nombre
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="nombre" 
                                name="nombre" 
                                placeholder="Juan" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="apellidos">
                                <i class="fas fa-user"></i> Apellidos
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="apellidos" 
                                name="apellidos" 
                                placeholder="García" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="tu@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">
                            <i class="fas fa-lock"></i> Contraseña
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Mínimo 8 caracteres" 
                            minlength="8"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password_confirm">
                            <i class="fas fa-lock"></i> Confirmar Contraseña
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password_confirm" 
                            name="password_confirm" 
                            placeholder="Repite tu contraseña" 
                            minlength="8"
                            required
                        >
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="ciudad">
                                <i class="fas fa-map-marker-alt"></i> Ciudad
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="ciudad" 
                                name="ciudad" 
                                placeholder="Tu ciudad"
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="telefono">
                                <i class="fas fa-phone"></i> Teléfono
                            </label>
                            <input 
                                type="tel" 
                                class="form-control" 
                                id="telefono" 
                                name="telefono" 
                                placeholder="+591 770..."
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn-register">
                        <i class="fas fa-check"></i> Crear Cuenta
                    </button>

                    <div class="terms">
                        Al registrarte, aceptas nuestros <a href="#">términos de servicio</a> 
                        y <a href="#">política de privacidad</a>
                    </div>
                </form>

                <div class="divider">
                    <span></span>
                    <p>¿Ya tienes cuenta?</p>
                    <span></span>
                </div>

                <a href="{{ url_for('login') }}" class="btn-login-link">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </a>
            </div>
        </div>

        <p style="text-align: center; color: white; margin-top: 20px; font-size: 13px;">
            © 2026 CINEVOX - Ticketing Platform
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const password_confirm = document.getElementById('password_confirm').value;
            
            if (password !== password_confirm) {
                e.preventDefault();
                alert('Las contraseñas no coinciden');
                return false;
            }
        });
    </script>
</body>
</html>
